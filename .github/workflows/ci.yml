name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Analyze, format & test each package
        run: |
          set -e
          for d in packages/*/; do
            [ -f "${d}pubspec.yaml" ] || continue
            echo "::group::$d"
            (
              cd "$d"
              flutter pub get
              # Scope to the package's own dirs: nested demo apps are separate
              # packages whose formatter context (language version) differs.
              for f in lib test example bin tool; do
                [ -d "$f" ] && dart format --output=none --set-exit-if-changed "$f"
              done
              flutter analyze
              if [ -d test ]; then flutter test; fi
            )
            echo "::endgroup::"
          done

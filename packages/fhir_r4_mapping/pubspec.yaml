name: fhir_r4_mapping
description: >-
  FHIR Mapping Language (FML) engine for FHIR R4: parse StructureMaps and
  transform healthcare data between structures.
version: 0.5.1
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4

topics:
  - fhir
  - hl7
  - healthcare
  - mapping
  - interoperability

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.5.0

dependencies:
  collection: ^1.19.1
  crypto: ^3.0.7
  fhir_r4: ^0.5.0
  fhir_r4_path: ^0.5.0
  http: ^1.6.0
  uuid: ^4.5.3
  xml: ^6.6.1
  yaml: ^3.1.3

dev_dependencies:
  very_good_analysis: ^10.0.0
  test: ^1.29.0

name: fhir_r4
description: >-
  FHIR® R4B resources and data types for Dart and Flutter: strongly typed,
  immutable model classes with JSON, YAML, and XML serialization.
version: 0.5.1
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4

topics:
  - fhir
  - hl7
  - healthcare
  - interoperability
  - serialization

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.5.0

dependencies:
  collection: ^1.19.1
  # Leaf model-reflection interface (FhirBase implements FhirNode) so the
  # model-independent fhirpath/cql engines can navigate R4 data without
  # depending on this package directly. Published constraint; resolved to the
  # local checkout via pubspec_overrides.yaml until fhir_node is published.
  fhir_node: ^0.6.0
  uuid: ^4.5.3
  xml: ^6.6.1
  yaml: ^3.1.3

dev_dependencies:
  very_good_analysis: ^10.0.0
  test: ^1.29.0

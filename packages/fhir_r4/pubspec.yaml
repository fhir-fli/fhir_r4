name: fhir_r4
description: Library supporing the R4b Version of FHIR for Dart & Flutter.
version: 0.5.1
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.5.0

dependencies:
  collection: ^1.19.1
  # Leaf model-reflection interface (FhirBase implements FhirNode) so the
  # model-independent fhirpath/cql engines can navigate R4 data without
  # depending on this package directly.
  fhir_node:
    path: ../../../fhir_node
  uuid: ^4.5.3
  xml: ^6.6.1
  yaml: ^3.1.3

dev_dependencies:
  test: ^1.29.0

name: fhir_r4_validation
description: >-
  StructureDefinition-driven validation for FHIR R4B resources: structure,
  cardinality, value set bindings, and invariants.
version: 0.5.1
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4

topics:
  - fhir
  - hl7
  - healthcare
  - validation
  - interoperability

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.5.0

dependencies:
  collection: ^1.19.1
  fhir_r4: ^0.5.0
  fhir_r4_path: ^0.5.0
  http: ^1.6.0

dev_dependencies:
  test: ^1.29.0
  very_good_analysis: ^10.0.0

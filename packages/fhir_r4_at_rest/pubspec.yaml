name: fhir_r4_at_rest
description: A Dart package providing type-safe, fluent RESTful operations for FHIR R4B resources. 
version: 0.5.1
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4

topics:
  - fhir
  - hl7
  - healthcare
  - rest-api
  - interoperability

# This package supports all platforms listed below.
platforms:

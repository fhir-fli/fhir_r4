  macos:
  web:
  windows:

environment:
  sdk: ^3.5.0

dependencies:
  fhir_r4: ^0.5.0
  http: ^1.6.0

dev_dependencies:
  very_good_analysis: ^10.0.0
  test: ^1.29.0

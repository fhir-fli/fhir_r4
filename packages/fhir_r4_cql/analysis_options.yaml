# One lint policy for the whole monorepo: very_good_analysis with the
# family-standard suppressions (see the root analysis_options.yaml).
include: ../../analysis_options.yaml

# TODO(cql-cleanup): test/test/** is a June snapshot of the cql engine's own
# suite (pre-reorganization) and bin/ + utils/ are stale generator scripts —
# all queued for refresh/removal when the cql repo is finalized for publish.
# Excluded so known-stale code doesn't mask real findings in lib/.
analyzer:
  exclude:
    - test/test/**
    - bin/**
    - utils/**

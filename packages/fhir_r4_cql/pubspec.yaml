name: fhir_r4_cql
description: >-
  FHIR R4B binding for the model-independent `cql` engine: the R4
  ModelResolver and TerminologyProvider implementations that let the CQL
  engine execute against FHIR R4B data.
version: 0.6.0
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4

topics:
  - fhir
  - hl7
  - healthcare
  - cql
  - interoperability

environment:
  sdk: ^3.5.0

dependencies:
  cql:
    path: ../../../cql
  fhir_r4: ^0.6.0
  fhir_r4_path: ^0.6.0
  ucum: ^0.9.0
dev_dependencies:
  test: ^1.29.0
  very_good_analysis: ^10.0.0

name: fhir_r4_cql
description: >-
  FHIR R4 binding for the model-independent `cql` engine: the R4
  ModelResolver and TerminologyProvider implementations that let the CQL
  engine execute against FHIR R4 data.
version: 0.6.0
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/cql

environment:
  sdk: ^3.5.0

dependencies:
  cql:
    path: ../../../cql
  fhir_r4: ^0.5.0
  fhir_r4_path: ^0.5.0
  ucum: ^0.9.0

dev_dependencies:
  antlr4: ^4.13.2
  collection: ^1.19.1
  lints: ^5.1.1
  test: ^1.29.0

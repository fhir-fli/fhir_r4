# One lint policy for the whole monorepo: very_good_analysis with the
# family-standard suppressions (see the root analysis_options.yaml).
include: ../../analysis_options.yaml

# Temporary package-local relaxations, each tracked as backlog work:
# - public_member_api_docs: auth predates the docs requirement; needs a
#   documentation pass.
# - avoid_print: to be replaced by package:logging (see the package
#   review, auth work item).
# - style-only relaxations pending the same cleanup pass.
analyzer:
  errors:
    public_member_api_docs: ignore
    avoid_print: ignore
    lines_longer_than_80_chars: ignore
    cascade_invocations: ignore

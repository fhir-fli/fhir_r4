<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OAuth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        .success {
            color: #28a745;
        }
        .error {
            color: #dc3545;
        }
        code {
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="loading">
            <div class="spinner"></div>
            <h2>Processing Authentication...</h2>
            <p>Please wait while we complete the authorization.</p>
        </div>
        <div id="success" style="display: none;">
            <h2 class="success">Authentication Successful!</h2>
            <p>You can close this window and return to the app.</p>
        </div>
        <div id="error" style="display: none;">
            <h2 class="error">Authentication Failed</h2>
            <p id="error-message"></p>
        </div>
    </div>

    <script>
        // Parse the URL for OAuth callback parameters
        function handleCallback() {
            const url = new URL(window.location.href);
            const params = new URLSearchParams(url.search);
            const hash = new URLSearchParams(url.hash.substring(1));

            // Check for authorization code (authorization code flow)
            const code = params.get('code');
            const state = params.get('state');
            const error = params.get('error');
            const errorDescription = params.get('error_description');

            // Check for tokens in hash (implicit flow - less common now)
            const accessToken = hash.get('access_token');

            if (error) {
                showError(errorDescription || error);
                return;
            }

            if (code) {
                // Authorization code flow - most common for SMART on FHIR
                console.log('Authorization code received:', code);
                console.log('State:', state);

                // For Flutter web, the flutter_web_auth_2 package handles this
                // by checking for the code in the URL when the window is opened
                showSuccess();

                // The parent window or opener should handle the code exchange
                // This page just needs to show success and let flutter_web_auth_2
                // capture the URL parameters

                // If opened in a popup, try to close after a delay
                setTimeout(() => {
                    if (window.opener) {
                        window.close();
                    }
                }, 2000);

                return;
            }

            if (accessToken) {
                // Implicit flow (less secure, not recommended)
                console.log('Access token received (implicit flow)');
                showSuccess();
                return;
            }

            // No auth parameters found - might be direct navigation
            showError('No authorization parameters found in URL');
        }

        function showSuccess() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = message;
        }

        // Run on page load
        handleCallback();
    </script>
</body>
</html>

name: fhir_r4_auth
description: Secure authentication and authorization package for FHIR R4B applications implementing SMART on FHIR
version: 0.7.1
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4
issue_tracker: https://github.com/fhir-fli/fhir_r4/issues
documentation: https://pub.dev/documentation/fhir_r4_auth/latest/

topics:
  - fhir
  - smart-on-fhir
  - healthcare
  - authentication
  - oauth2

environment:
  sdk: ^3.5.0
  flutter: ">=3.10.0"

dependencies:
  crypto: ^3.0.7                 # PKCE and crypto operations
  fhir_r4: ^0.7.0
  flutter:
    sdk: flutter
  flutter_appauth: ^12.0.0         # Native OAuth for mobile
  flutter_secure_storage: ^10.0.0
  flutter_web_auth_2: ^5.0.0       # Web authentication fallback
  flutter_web_auth_2_platform_interface: ^5.0.0
  http: ^1.6.0
  jose: ^0.3.5+2                     # JWT/JWK/JOSE implementation
  logging: ^1.3.0                  # Audit logging
  url_launcher: ^6.3.2             # Launching auth URLs
  uuid: ^4.5.2                     # Generate state/nonce
dev_dependencies:
  build_runner: ^2.10.4
  fake_async: ^1.3.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  http_mock_adapter: ^0.6.1
  integration_test:
    sdk: flutter
  mockito: ^5.6.1
  test: ^1.26.3
  very_good_analysis: ^10.0.0
false_secrets:
  - standalone_demo/lib/main.dart
  - ehr_launch_demo/lib/main.dart
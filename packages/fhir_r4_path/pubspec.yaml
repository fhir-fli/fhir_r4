name: fhir_r4_path
description: >-
  FHIRPath for FHIR R4B: the version binding for the model-independent
  fhirpath engine, with terminology support.
version: 0.6.0
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4

topics:
  - fhir
  - fhirpath
  - hl7
  - healthcare
  - interoperability

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.5.0

dependencies:
  collection: ^1.19.1
  fhir_node: ^0.6.0
  fhir_r4: ^0.6.0
  fhirpath: ^0.6.0
  http: ^1.6.0
  meta: ^1.16.0
  ucum: ^0.9.0
  universal_io: ^2.3.1

dev_dependencies:
  test: ^1.29.0
  very_good_analysis: ^10.0.0
 
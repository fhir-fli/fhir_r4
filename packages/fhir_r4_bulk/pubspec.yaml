name: fhir_r4_bulk
description: Library to support the FHIR Bulk Data Access API (https://www.hl7.org/fhir/uv/bulkdata/index.html) for FHIR R4B resources.
version: 0.7.0
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4
issue_tracker: https://github.com/fhir-fli/fhir_r4/issues

topics:
  - fhir
  - hl7
  - healthcare
  - bulk-data
  - ndjson

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.5.0

dependencies:
  archive: ^4.0.9
  fhir_r4: ^0.7.0
  http: ^1.6.0
  mime: ^2.0.0

dev_dependencies:
  test: ^1.29.0
  very_good_analysis: ^10.0.0

name: fhir_r4_db
description: FHIR R4B database with SQLite/Drift backend, search parameter indexing, and optional encryption.
version: 0.7.0
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4
issue_tracker: https://github.com/fhir-fli/fhir_r4/issues

topics:
  - fhir
  - hl7
  - healthcare
  - database
  - sqlite

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.5.0

dependencies:
  collection: ^1.19.1
  crypto: ^3.0.7
  drift: ^2.33.0
  fhir_r4: ^0.7.0
  sqlite3: ^3.1.5

dev_dependencies:
  build_runner: ^2.4.0
  drift_dev: ^2.33.0
  test: ^1.29.0
  very_good_analysis: ^10.0.0

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

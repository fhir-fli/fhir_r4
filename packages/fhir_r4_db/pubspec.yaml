name: fhir_r4_db
description: FHIR R4 database with SQLite/Drift backend, search parameter indexing, and optional encryption.
version: 0.5.0
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.5.0

dependencies:
  collection: ^1.19.1
  crypto: ^3.0.7
  drift: ^2.31.0
  fhir_r4: ^0.5.0
  sqlite3: ^2.4.6

dev_dependencies:
  build_runner: ^2.4.0
  drift_dev: ^2.31.0
  test: ^1.29.0

dependency_overrides:
  sqlite3: ^3.1.5

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

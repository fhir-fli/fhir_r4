targets:
  $default:
    builders:
      swagger_dart_code_generator|swagger_dart_code_generator:
        options:
          input_folder: "lib"
          output_folder: "lib/generated_code"
      json_serializable: # This should also be placed under `builders`
        options:
          any_map: false
          checked: false
          create_factory: true
          create_to_json: true
          disallow_unrecognized_keys: false
          explicit_to_json: true
          field_rename: none
          ignore_unannotated: false
          include_if_null: false

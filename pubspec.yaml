name: fhir_r4
description: FHIR library for supporing the R5 Version of FHIR for Dart & Flutter.
version: 0.2.0
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhir_r4

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  chopper: ^8.0.3
  json_annotation: ^4.9.0
  yaml: ^3.1.2
  yaml_writer: ^2.0.0

dev_dependencies:
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  test: ^1.25.8
  chopper_generator: ^8.0.0
  swagger_dart_code_generator: ^2.15.2